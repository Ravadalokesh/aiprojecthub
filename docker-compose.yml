version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: projecthub-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: projectmanagement
    volumes:
      - mongodb_data:/data/db
    networks:
      - projecthub-network

  redis:
    image: redis:7-alpine
    container_name: projecthub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - projecthub-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projecthub-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/projectmanagement
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_change_this}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openrouter/auto}
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mongodb
      - redis
    networks:
      - projecthub-network
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projecthub-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - projecthub-network
    volumes:
      - ./frontend/src:/app/src

volumes:
  mongodb_data:
  redis_data:

networks:
  projecthub-network:
    driver: bridge
